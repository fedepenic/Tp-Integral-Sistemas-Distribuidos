services:
  rabbitmq:
    build:
      context: .
      dockerfile: cmd/rabbitmq/Dockerfile
    environment:
      - RABBITMQ_LOG_LEVELS=error
    ports:
      - 5672:5672
      - 15672:15672
    healthcheck:
      test: rabbitmq-diagnostics check_port_connectivity
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 50s

  gateway:
    build:
      context: .
      dockerfile: cmd/gateway/Dockerfile
    environment:
      - GATEWAY_PORT=8080
    depends_on:
      rabbitmq:
        condition: service_healthy

  client_1:
    build:
      context: .
      dockerfile: cmd/client/Dockerfile
    environment:
      - INSTANCE_ID=1
      - INSTANCE_TOTAL=2
      - GATEWAY_HOST=gateway
      - GATEWAY_PORT=8080
      - INPUT_DIR=/data/client_1
      - BATCH_SIZE=100
    volumes:
      - ../input:/data
    depends_on:
      - gateway

  client_2:
    build:
      context: .
      dockerfile: cmd/client/Dockerfile
    environment:
      - INSTANCE_ID=2
      - INSTANCE_TOTAL=2
      - GATEWAY_HOST=gateway
      - GATEWAY_PORT=8080
      - INPUT_DIR=/data/client_2
      - BATCH_SIZE=100
    volumes:
      - ../input:/data
    depends_on:
      - gateway

  filter_1:
    build:
      context: .
      dockerfile: cmd/filter/Dockerfile
    environment:
      - INSTANCE_ID=1
      - INSTANCE_TOTAL=1

  joiner_1:
    build:
      context: .
      dockerfile: cmd/joiner/Dockerfile
    environment:
      - INSTANCE_ID=1
      - INSTANCE_TOTAL=3

  joiner_2:
    build:
      context: .
      dockerfile: cmd/joiner/Dockerfile
    environment:
      - INSTANCE_ID=2
      - INSTANCE_TOTAL=3

  joiner_3:
    build:
      context: .
      dockerfile: cmd/joiner/Dockerfile
    environment:
      - INSTANCE_ID=3
      - INSTANCE_TOTAL=3

  counter_1:
    build:
      context: .
      dockerfile: cmd/counter/Dockerfile
    environment:
      - INSTANCE_ID=1
      - INSTANCE_TOTAL=2

  counter_2:
    build:
      context: .
      dockerfile: cmd/counter/Dockerfile
    environment:
      - INSTANCE_ID=2
      - INSTANCE_TOTAL=2

  filter_usd:
    build:
      context: .
      dockerfile: cmd/filter/Dockerfile
    environment:
      - FILTER_FIELD=payment_currency
      - FILTER_OP=eq
      - FILTER_VALUE=US Dollar
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - INPUT_QUEUE=txn_for_usd
      - OUTPUT_QUEUE=usd_filtered
      - EOF_INPUT_EXCHANGE=eof_cleaner
      - EOF_INPUT_KEY=filter_usd
      - EOF_OUTPUT_EXCHANGE=eof_usd_filter
      - EOF_OUTPUT_KEY=done
      - UPSTREAM_INSTANCES=1
